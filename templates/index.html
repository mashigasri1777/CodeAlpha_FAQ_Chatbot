```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>InsightFAQ</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="chat-card">

        <div class="chat-header">

            <h1>InsightFAQ</h1>

            <p>AI Powered FAQ Assistant</p>

        </div>

        <div id="chat-box" class="chat-box">

            <div class="welcome-box">

                <h3>Hello! 👋</h3>

                <p>I can answer questions about:</p>

                <ul>
                    <li>Artificial Intelligence</li>
                    <li>Machine Learning</li>
                    <li>Deep Learning</li>
                    <li>Natural Language Processing</li>
                    <li>Computer Vision</li>
                    <li>Python for AI</li>
                </ul>

                <p>
                    Ask me anything.
                </p>

            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Ask a question about AI..."
                autocomplete="off">

            <button
                class="send-btn"
                type="button"
                onclick="sendMessage()">

                Send

            </button>

        </div>

    </div>

    <script src="{{ url_for('static',
    filename='js/script.js') }}"></script>

</body>

</html>
